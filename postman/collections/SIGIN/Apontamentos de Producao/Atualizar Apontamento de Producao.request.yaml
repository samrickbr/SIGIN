$kind: http-request
name: Atualizar Apontamento de Producao
method: PUT
url: '{{baseUrl}}/apontamentos-producao/{{apontamentoId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "quantidadeProduzida": 6.0,
      "quantidadePerda": 0.2,
      "observacao": "Atualizado",
      "ativo": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
