$kind: http-request
name: Atualizar Op Material
method: PUT
url: '{{baseUrl}}/op-materiais/{{opMaterialId}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "quantidadePlanejada": 0.8,
      "quantidadeConsumida": 0.3,
      "ativo": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
