$kind: http-request
name: Listar Op Materiais por OP
method: GET
url: '{{baseUrl}}/op-materiais/ordem/{{ordemProducaoId}}'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Resposta é array", () => {
        pm.expect(pm.response.json()).to.be.an('array');
      });
