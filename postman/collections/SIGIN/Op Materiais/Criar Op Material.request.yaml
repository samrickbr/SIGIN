$kind: http-request
name: Criar Op Material
method: POST
url: '{{baseUrl}}/op-materiais'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "ordemProducaoId": 1,
      "materialId": 1,
      "quantidadePlanejada": 0.5
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("OpMaterial criado com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("opMaterialId", json.id);
      });
