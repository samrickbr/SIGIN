$kind: http-request
name: Criar Produto Material
method: POST
url: '{{baseUrl}}/produto-materiais'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "produtoId": 1,
      "materialId": 1,
      "quantidade": 2.5
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Produto Material criado com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("produtoMaterialId", json.id);
      });
