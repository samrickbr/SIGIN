$kind: http-request
name: Atualizar Local
method: PUT
url: '{{baseUrl}}/locais/{{localId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Estoque Principal Atualizado",
      "ativo": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Nome atualizado", () => {
        const json = pm.response.json();
        pm.expect(json.nome).to.include("Atualizado");
      });
