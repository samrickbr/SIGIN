$kind: http-request
name: Criar Movimentacao
method: POST
url: '{{baseUrl}}/movimentacoes-estoque'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "produtoId": 1,
      "materialId": null,
      "localId": 1,
      "tipo": "PRODUTO",
      "movimento": "ENTRADA",
      "quantidade": 10.0,
      "origem": "MANUAL",
      "referenciaId": null,
      "observacao": "Movimentação de teste",
      "responsavelId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Movimentacao criada com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("movimentacaoId", json.id);
      });
