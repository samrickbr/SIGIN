$kind: http-request
name: Criar Tipo de Pessoa
method: POST
url: '{{baseUrl}}/tipos-pessoa'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Cliente",
      "descricao": "Tipo cliente final"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Tipo criado com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("tipoPessoaId", json.id);
      });
