$kind: http-request
url: "{{baseUrl}}/ordens-producao"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "numero": "OP000003",
      "produtoId": 4,
      "quantidadePlanejada": 20,
      "localDestinoId": 1,
      "responsavelId": 1,
      "origem": "POSTMAN",
      "observacao": "Fluxo teste produção automática"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("OP criada com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("ordemProducaoId", json.id);
      });
    language: text/javascript
order: 1783981867378
