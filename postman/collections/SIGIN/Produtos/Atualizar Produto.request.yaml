$kind: http-request
name: Atualizar Produto
method: PUT
url: '{{baseUrl}}/produtos/{{produtoId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Vaso Decorativo P - Atualizado",
      "descricao": "Vaso pequeno atualizado",
      "categoriaId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Nome atualizado", () => {
        const json = pm.response.json();
        pm.expect(json.nome).to.include("Atualizado");
      });
