$kind: http-request
name: Listar Produtos
method: GET
url: '{{baseUrl}}/produtos'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Resposta é array", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('array');
      });
