$kind: http-request
name: Criar Produto
method: POST
url: '{{baseUrl}}/produtos'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Vaso Decorativo P",
      "descricao": "Vaso pequeno em PLA",
      "categoriaId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Produto criado com ID", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
        pm.environment.set("produtoId", json.id);
      });
